<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <script src="js/script.js" defer></script>
    <link rel="stylesheet" href="css/styles.css">

<body>
    <header>
        <h1>Weather App</h1>
           
        <input type="text" id="locationInput" placeholder="Enter location">
        <button onclick="getWeather()">Search</button>

        <div id="errorMessage"></div>
        <div id="locationName"></div>
   
    </header>

 

    <div id="todaysWeather"></div>
    <div id="weeklyForecast"></div>

</body>
</html>

<section id="locationSection" class="card hidden">
    <div class="location-header">
        <div>
            <h2 id="locationName">Location</h2>
            <p id="localTime">Local time:</p>
        </div>
        <div class="condition-badge">
            <img id="conditionIcon" src="" alt="Weather icon">
            <span id="conditionText">Condition</span>
        </div>
    </div>
    <section id="currentWeatherSection" class="grid hidden">
        <div class="card current-card">
            <h3>Current Weather</h3>
            <div class="temp-row">
                <p id="temperature" class="big-temp">--°C</p>
                <p id="feelsLike" class="feels-like">Feels like --°C</p>
            </div>
            <div class="details-grid">
                <div class="detail-box">
                    <span>Humidity</span>
                    <strong id="humidity">--%</strong>
                </div>
                <div class="detail-box">
                    <span>Wind</span>
                    <strong id="wind">-- kph</strong>
                </div>
                <div class="detail-box">
                    <span>UV Index</span>
                    <strong id="uv">--</strong>
                </div>

</section>
